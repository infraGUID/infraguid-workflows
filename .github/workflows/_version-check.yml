name: Reusable - Release Version Check

on:
  workflow_call:
    inputs:
      service-name:
        description: "Service name, used as the git tag prefix (e.g. agent-service)"
        required: true
        type: string
      version:
        description: "Requested release version, semver X.Y.Z (no leading v)"
        required: true
        type: string

jobs:
  check:
    name: Validate version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need the full tag history to find the latest release

      - name: Validate semver, ordering and tag uniqueness
        env:
          NEW: ${{ inputs.version }}
          SVC: ${{ inputs.service-name }}
        run: |
          set -euo pipefail

          if ! printf '%s' "$NEW" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$NEW' is not valid semver (expected X.Y.Z, no leading 'v')"
            exit 1
          fi

          git fetch --tags --force >/dev/null 2>&1 || true
          TAG="${SVC}-v${NEW}"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::error::Tag ${TAG} already exists — pick a new version"
            exit 1
          fi

          LATEST="$(git tag -l "${SVC}-v*" | sed "s|^${SVC}-v||" | sort -V | tail -n1)"
          if [ -z "$LATEST" ]; then
            echo "✅ No previous release for ${SVC}; ${NEW} accepted as the first release."
            exit 0
          fi

          HIGHEST="$(printf '%s\n%s\n' "$LATEST" "$NEW" | sort -V | tail -n1)"
          if [ "$NEW" = "$LATEST" ] || [ "$HIGHEST" != "$NEW" ]; then
            echo "::error::Version ${NEW} must be strictly greater than the latest release ${LATEST}"
            exit 1
          fi

          echo "✅ ${NEW} > ${LATEST} and tag ${TAG} is free."
