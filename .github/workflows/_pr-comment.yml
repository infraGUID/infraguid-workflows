name: Reusable - PR Validation Comment

# Posts (or updates) a single sticky comment on the PR summarising the validation
# results for one service. Nothing is published on PRs — this is informational.

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      sast:
        description: "Result of the SAST job (success/failure/skipped/cancelled)"
        required: true
        type: string
      sca:
        description: "Result of the SCA job; pass 'skipped' for services without SCA"
        required: false
        default: "skipped"
        type: string
      trivy:
        description: "Result of the image build + Trivy job; pass 'skipped' for services with no image"
        required: false
        default: "skipped"
        type: string

jobs:
  comment:
    name: Post validation summary
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Upsert sticky comment
        uses: actions/github-script@v7
        env:
          SVC: ${{ inputs.service-name }}
          SAST: ${{ inputs.sast }}
          SCA: ${{ inputs.sca }}
          TRIVY: ${{ inputs.trivy }}
        with:
          script: |
            const icon = (r) =>
              r === 'success' ? '✅'
              : r === 'skipped' ? '⏭️'
              : r === 'cancelled' ? '🚫'
              : '❌';

            const svc = process.env.SVC;
            const sast = process.env.SAST;
            const sca = process.env.SCA;
            const trivy = process.env.TRIVY;

            const allOk = [sast, trivy, sca]
              .every(r => r === 'success' || r === 'skipped');

            const marker = `<!-- ci-validation:${svc} -->`;
            const body = [
              marker,
              `### 🔎 CI validation — \`${svc}\``,
              ``,
              `**Overall:** ${allOk ? '✅ passed' : '❌ failed'}`,
              ``,
              `| Check | Result |`,
              `| --- | --- |`,
              `| SAST (SonarCloud) | ${icon(sast)} ${sast} |`,
              `| SCA (Snyk) | ${icon(sca)} ${sca} |`,
              `| Image build + Trivy | ${icon(trivy)} ${trivy} |`,
              ``,
              `_No image is published on pull requests — publishing happens only on \`workflow_dispatch\`._`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
