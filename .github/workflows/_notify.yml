name: Reusable - Notify (SNS)

on:
  workflow_call:
    inputs:
      subject:
        required: true
        type: string
      body:
        required: true
        type: string
      service-name:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Publish to SNS
        run: |
          aws sns publish \
            --topic-arn "${{ vars.ALERTS_TOPIC_ARN }}" \
            --subject "${{ inputs.subject }}" \
            --message "[${{ inputs.service-name }}] ${{ inputs.body }}"
