name: Reusable - SCA (Snyk)

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      service-path:
        required: true
        type: string
    secrets:
      SNYK_TOKEN:
        required: true
    outputs:
      critical-found:
        description: "true if critical/high vulnerabilities were found"
        value: ${{ jobs.sca.outputs.critical-found }}

jobs:
  sca:
    runs-on: ubuntu-latest
    outputs:
      critical-found: ${{ steps.scan.outputs.critical-found }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Snyk
        run: npm install -g snyk

      - name: Snyk test
        id: scan
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          cd "${{ inputs.service-path }}"
          if snyk test --severity-threshold=high --file=requirements.txt --package-manager=pip; then
            echo "critical-found=false" >> "$GITHUB_OUTPUT"
          else
            echo "critical-found=true" >> "$GITHUB_OUTPUT"
          fi
