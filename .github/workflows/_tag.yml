name: Reusable - Git Release Tag

# Creates and pushes an annotated release tag (<service>-vX.Y.Z) after a
# successful image publish. Tags are namespaced per service because all services
# share one repo. Runs only as part of a release dispatch.

on:
  workflow_call:
    inputs:
      service-name:
        description: "Service name, used as the git tag prefix (e.g. agent-service)"
        required: true
        type: string
      version:
        description: "Release version, semver X.Y.Z (no leading v)"
        required: true
        type: string

jobs:
  tag:
    name: Push release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create & push annotated tag
        env:
          SVC: ${{ inputs.service-name }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          TAG="${SVC}-v${VERSION}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release ${SVC} v${VERSION}"
          git push origin "$TAG"
          echo "Pushed tag $TAG"
